<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Factura - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="border p-5 shadow-sm bg-white rounded">
                    <h2 class="text-center mb-4">Registrar Nueva Factura</h2>
                    
                    <form id="formularioCrear">
                        <div class="mb-3">
                            <label for="concepto" class="form-label fw-bold">Concepto / Descripción</label>
                            <input type="text" class="form-control" id="concepto" placeholder="Ej: Reparación motor y cambio aceite..." required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="monto" class="form-label fw-bold">Monto Total</label>
                                <input type="number" class="form-control" id="monto" min="0" step="0.01" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="fecha" class="form-label fw-bold">Fecha de Facturación</label>
                                <input type="date" class="form-control" id="fecha" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="metodo_pago" class="form-label fw-bold">Método de Pago</label>
                            <select class="form-select" id="metodo_pago" required>
                                <option value="" selected disabled>Seleccione...</option>
                                <option value="EFECTIVO">Efectivo</option>
                                <option value="TRANSFERENCIA">Transferencia</option>
                                <option value="TARJETA">Tarjeta</option>
                                <option value="PENDIENTE">Pendiente por pagar</option>
                            </select>
                        </div>

                        <div class="row border-top pt-3 mt-3">
                            <h6 class="text-muted mb-3">Asignación</h6>
                            <div class="col-md-6 mb-3">
                                <label for="trabajo_id" class="form-label fw-bold">ID del Trabajo (UUID)</label>
                                <input type="text" class="form-control" id="trabajo_id" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="cliente_id" class="form-label fw-bold">ID del Cliente (UUID)</label>
                                <input type="text" class="form-control" id="cliente_id" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexFacturas.html" class="btn btn-outline-secondary">← Volver a la lista</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar Factura</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/factura/crearFactura.js"></script>
</body>
</html>
