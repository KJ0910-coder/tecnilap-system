<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Iniciar Sesión - TecniLAP</title>
    <style>
        body { background-color: #f4f6f9; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card text-center border-top border-primary border-4">
            <h2 class="fw-bold text-primary mb-1">TecniLAP</h2>
            <p class="text-muted mb-4">Sistema de Gestión Interna</p>

            <form id="formularioLogin">
                <div class="mb-4 text-start">
                    <label for="usuario_id" class="form-label fw-bold">¿Quién está ingresando?</label>
                    <select class="form-select form-select-lg" id="usuario_id" required>
                        <option value="" selected disabled>Cargando usuarios...</option>
                        </select>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Entrar al Sistema</button>
            </form>
        </div>
    </div>

    <script src="../fetch/login.js"></script>
</body>
</html>
