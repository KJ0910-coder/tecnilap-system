<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Gestión de Usuarios - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <br><h2 class="text-center">Lista de Usuarios</h2><br>

    <div class="container border p-4 shadow-sm bg-white rounded">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="crearUsuario.html" class="btn btn-primary">Registrar Usuario</a>
            
            <div class="d-flex align-items-center">
                <label for="filasPorPagina" class="me-2 mb-0 fw-bold">Mostrar:</label>
                <select id="filasPorPagina" class="form-select form-select-sm" style="width: 80px;">
                    <option value="3" selected>3</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle" id="tablaDatos">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center">ID</th>
                        <th class="text-center">Nombre</th>
                        <th class="text-center">Correo</th>
                        <th class="text-center">Rol</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Creado el</th>
                        <th colspan="2" class="text-center">Operaciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <div class="d-flex justify-content-center gap-3 mt-3">
            <button class="btn btn-outline-secondary" id="paginaAnterior" style="display: none;">← Volver</button>
            <button class="btn btn-outline-primary" id="paginaSiguiente" style="display: none;">Siguiente →</button>
        </div>

    </div>

    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/usuario/listarUsuarios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
