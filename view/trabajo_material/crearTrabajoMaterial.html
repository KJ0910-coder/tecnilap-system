<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Material en Trabajo - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="border p-5 shadow-sm bg-white rounded">
                    <h2 class="text-center mb-4">Asignar Material a Trabajo</h2>
                    
                    <form id="formularioCrear">
                        <div class="mb-3">
                            <label for="trabajo_id" class="form-label fw-bold">ID del Trabajo (UUID)</label>
                            <input type="text" class="form-control" id="trabajo_id" placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000" required>
                        </div>

                        <div class="mb-3">
                            <label for="material_id" class="form-label fw-bold">ID del Material (UUID)</label>
                            <input type="text" class="form-control" id="material_id" placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000" required>
                        </div>

                        <div class="mb-3">
                            <label for="cantidad_usada" class="form-label fw-bold">Cantidad Usada</label>
                            <input type="number" class="form-control" id="cantidad_usada" min="1" placeholder="Ej: 5" required>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexTrabajoMaterial.html" class="btn btn-outline-secondary">← Volver a la lista</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar Registro</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/trabajo_material/crearTrabajoMaterial.js"></script>
</body>
</html>
