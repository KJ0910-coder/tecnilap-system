<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Reporte Financiero - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <br><h2 class="text-center">Reporte Financiero Mensual</h2><br>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white fw-bold">
                        Filtros del Reporte
                    </div>
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-5">
                                <label for="mes" class="form-label fw-bold">Mes</label>
                                <select id="mes" class="form-select"></select>
                            </div>
                            <div class="col-md-4">
                                <label for="anio" class="form-label fw-bold">Año</label>
                                <input type="number" id="anio" class="form-control" min="2025">
                            </div>
                            <div class="col-md-3">
                                <button id="btnGenerar" class="btn btn-primary w-100">Generar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow text-center border-0" id="tarjetaResultado" style="display: none;">
                    <div class="card-body py-5 bg-white rounded">
                        <h4 class="text-muted mb-3">Total de Ingresos Facturados</h4>
                        <h1 class="display-4 fw-bold text-success" id="totalDinero">$0</h1>
                        <p class="text-muted mt-2" id="textoPeriodo">Período: -</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../../fetch/reporte/obtenerReporte.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
