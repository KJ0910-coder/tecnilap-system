<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Material - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="border p-5 shadow-sm bg-white rounded">
                    <h2 class="text-center mb-4">Ingresar Material al Inventario</h2>
                    
                    <form id="formularioCrear">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Material</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ej: Aceite 10W-40, Filtro de Aire..." required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="cantidad_total" class="form-label fw-bold">Cantidad Total (Comprada)</label>
                                <input type="number" class="form-control" id="cantidad_total" min="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="stock_actual" class="form-label fw-bold">Stock Actual (Inicial)</label>
                                <input type="number" class="form-control" id="stock_actual" min="0" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="proveedor_id" class="form-label fw-bold">ID del Proveedor (UUID)</label>
                            <input type="text" class="form-control" id="proveedor_id" placeholder="Pegue aquí el UUID del proveedor" required>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexMateriales.html" class="btn btn-outline-secondary">← Volver a la lista</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar Material</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/material/crearMaterial.js"></script>
</body>
</html>
