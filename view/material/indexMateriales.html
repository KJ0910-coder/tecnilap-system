<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Inventario de Materiales - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <br><h2 class="text-center">Inventario de Materiales</h2><br>

    <div class="container">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Buscar Material Específico</h5>
                <div class="row g-3 align-items-center">
                    <div class="col-md-8">
                        <input type="text" id="inputBuscarMaterial" class="form-control" placeholder="Pega aquí el ID del Material (UUID)...">
                    </div>
                    <div class="col-md-2">
                        <button id="btnBuscarMaterial" class="btn btn-dark w-100">Buscar</button>
                    </div>
                    <div class="col-md-2">
                        <button id="btnLimpiarBuscador" class="btn btn-outline-secondary w-100">Ver Todos</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="border p-4 shadow-sm bg-white rounded">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a href="crearMaterial.html" class="btn btn-primary">Registrar Nuevo Material</a>
                
                <div class="d-flex align-items-center">
                    <label for="filasPorPagina" class="me-2 mb-0 fw-bold">Mostrar:</label>
                    <select id="filasPorPagina" class="form-select form-select-sm" style="width: 80px;">
                        <option value="3" selected>3</option>
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="tablaDatos">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">Nombre del Material</th>
                            <th class="text-center">Cant. Total</th>
                            <th class="text-center">Stock Actual</th>
                            <th class="text-center">ID Proveedor</th>
                            <th colspan="3" class="text-center">Operaciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-3">
                <button class="btn btn-outline-secondary" id="paginaAnterior" style="display: none;">← Volver</button>
                <button class="btn btn-outline-primary" id="paginaSiguiente" style="display: none;">Siguiente →</button>
            </div>
        </div>
    </div>

    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/material/listarMateriales.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
