<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Cliente - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="border p-5 shadow-sm bg-white rounded">
                    <h2 class="text-center mb-4">Registrar Nuevo Cliente</h2>
                    
                    <form id="formularioCrear">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nit" class="form-label fw-bold">NIT / CC</label>
                                <input type="text" class="form-control" id="nit" placeholder="Documento de identidad o NIT" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="nombre" class="form-label fw-bold">Nombre o Razón Social</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Nombre completo o empresa" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="telefono" class="form-label fw-bold">Teléfono</label>
                                <input type="text" class="form-control" id="telefono" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="tipo_cliente" class="form-label fw-bold">Tipo de Cliente</label>
                                <select class="form-select" id="tipo_cliente" required>
                                    <option value="" selected disabled>Seleccione...</option>
                                    <option value="NATURAL">Persona Natural</option>
                                    <option value="EMPRESA">Empresa / Jurídica</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control" id="correo" required>
                        </div>

                        <div class="mb-3">
                            <label for="direccion" class="form-label fw-bold">Dirección</label>
                            <textarea class="form-control" id="direccion" rows="2" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexClientes.html" class="btn btn-outline-secondary">← Volver a la lista</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar Cliente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
<script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/cliente/crearCliente.js"></script>
</body>
</html>
