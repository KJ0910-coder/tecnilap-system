<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Nota - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8">
                <div class="border p-5 shadow-sm bg-white rounded border-top border-secondary border-4">
                    <h2 class="text-center mb-4">Agregar Nota al Historial</h2>
                    
                    <form id="formularioCrear">
                        <div class="mb-3">
                            <label for="accion" class="form-label fw-bold">Tipo de Acción (Palabra Clave)</label>
                            <input type="text" class="form-control" id="accion" placeholder="Ej: NOTA_MANUAL, REVISION_INVENTARIO..." required>
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción detallada</label>
                            <textarea class="form-control" id="descripcion" rows="4" placeholder="Escribe aquí los detalles que deseas dejar en la bitácora..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexActividades.html" class="btn btn-outline-secondary">← Volver al historial</a>
                            <button type="submit" class="btn btn-dark px-4">Guardar en Bitácora</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../../fetch/actividad/crearActividad.js"></script>
</body>
</html>
