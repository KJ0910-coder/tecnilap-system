<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registro de Actividad - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>
    
    <br><h2 class="text-center">Auditoría y Registro de Actividad</h2><br>

    <div class="container border p-4 shadow-sm bg-white rounded border-top border-secondary border-4">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="crearActividad.html" class="btn btn-primary">Agregar Nota / Actividad Manual</a>
            
            <div class="d-flex align-items-center">
                <label for="filasPorPagina" class="me-2 mb-0 fw-bold">Mostrar:</label>
                <select id="filasPorPagina" class="form-select form-select-sm" style="width: 80px;">
                    <option value="3"selected>3</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle table-sm" id="tablaDatos">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center">Fecha y Hora</th>
                        <th class="text-center">Usuario Responsable</th>
                        <th class="text-center">Acción</th>
                        <th>Descripción del Movimiento</th>
                        <th class="text-center">Operación</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr><td colspan="5" class="text-center">Cargando historial...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-center gap-3 mt-3">
            <button class="btn btn-outline-secondary" id="paginaAnterior" style="display: none;">← Volver</button>
            <button class="btn btn-outline-primary" id="paginaSiguiente" style="display: none;">Siguiente →</button>
        </div>
    </div>

    <script src="../../fetch/actividad/listarActividades.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
