<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Trabajo - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="border p-5 shadow-sm bg-white rounded">
                    <h2 class="text-center mb-4">Registrar Nuevo Trabajo</h2>
                    
                    <form id="formularioCrear">
                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción del Trabajo</label>
                            <textarea class="form-control" id="descripcion" rows="3" placeholder="Ej: Reparación de motor..." required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="cliente_id" class="form-label fw-bold">ID del Cliente (UUID)</label>
                                <input type="text" class="form-control" id="cliente_id" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="consecutivo" class="form-label fw-bold">Consecutivo (Opcional)</label>
                                <input type="text" class="form-control" id="consecutivo" placeholder="Dejar en blanco si es auto">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="fecha_realizacion" class="form-label fw-bold">Fecha de Realización</label>
                                <input type="date" class="form-control" id="fecha_realizacion">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="fecha_entrega" class="form-label fw-bold">Fecha de Entrega</label>
                                <input type="date" class="form-control" id="fecha_entrega">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexTrabajos.html" class="btn btn-outline-secondary">← Volver a la lista</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar Trabajo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/trabajo/crearTrabajo.js"></script>
</body>
</html>
