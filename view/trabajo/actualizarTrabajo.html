<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Actualizar Trabajo - TecniLAP</title>
</head>
<body class="bg-light">

    <div class="container mt-3">
        <a href="../dashboard.html" class="btn btn-dark btn-sm shadow-sm">Volver al Menú Principal</a>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="border p-5 shadow-sm bg-white rounded">
                    <h2 class="text-center mb-4">Actualizar Trabajo</h2>
                    
                    <form id="formularioActualizar">
                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción del Trabajo</label>
                            <textarea class="form-control" id="descripcion" rows="3" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="estado" class="form-label fw-bold">Estado del Trabajo</label>
                            <select class="form-select" id="estado" required>
                                <option value="PENDIENTE">PENDIENTE</option>
                                <option value="EN PROGRESO">EN PROGRESO</option>
                                <option value="COMPLETADO">COMPLETADO</option>
                                <option value="CANCELADO">CANCELADO</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="fecha_realizacion" class="form-label fw-bold">Fecha de Realización</label>
                                <input type="date" class="form-control" id="fecha_realizacion">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="fecha_entrega" class="form-label fw-bold">Fecha de Entrega</label>
                                <input type="date" class="form-control" id="fecha_entrega">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="indexTrabajos.html" class="btn btn-outline-secondary">← Cancelar y volver</a>
                            <button type="submit" class="btn btn-warning px-4 text-dark fw-bold">Actualizar Trabajo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../../fetch/utils/auditoria.js"></script> <script src="../../fetch/trabajo/actualizarTrabajo.js"></script>
</body>
</html>
